name = "Jinja2 (Python)"
grammar = "jinja2"
path_suffixes = ["py.jinja", "py.jinja2", "py.j2"]
line_comments = ["{#", "#}"]
block_comment = ["{# ", " #}"]
brackets = [
  { start = "{%", end = "%}", close = true, newline = false },
  { start = "{{", end = "}}", close = true, newline = false },
  { start = "{#", end = "#}", close = true, newline = false },
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
]
scope_opt_in_language_servers = [
  "jinja2-lsp",
  "vscode-jinja",
]
