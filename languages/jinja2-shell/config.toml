name = "Jinja2 (Shell)"
grammar = "jinja2"
path_suffixes = ["sh.jinja", "sh.jinja2", "sh.j2", "bash.jinja", "bash.jinja2", "bash.j2"]
block_comment = ["{#", "#}"]
autoclose_before = " \t\n\r;:.,=}])>"
brackets = [
  { start = "{%", end = "%}", close = true, newline = false },
  { start = "{{", end = "}}", close = true, newline = false },
  { start = "{#", end = "#}", close = true, newline = false },
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
]
scope_opt_in_language_servers = [
  "jinja2-lsp",
  "vscode-jinja",
]

increase_indent_pattern = "^\\s*\\{%\\s*(if|for|with|block|filter|macro|autoescape|trans|pluralize|call)\\b"
decrease_indent_pattern = "^\\s*\\{%\\s*(end(if|for|with|block|filter|macro|autoescape|trans|pluralize|call)|else|elif)\\b"
